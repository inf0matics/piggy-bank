name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Chromium runs on the host and drives the app over the mapped Docker port.
      # --with-deps installs Chromium's system libraries (required on Ubuntu runners).
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # global-setup brings up docker-compose.e2e.yml (app + LNBits mock) and waits
      # for it to be healthy; the test fixture config is wired in via the compose file.
      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
