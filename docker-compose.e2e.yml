# Full E2E stack: the piggybank app + the LNBits mock on a shared network.
# Playwright runs on the host and drives a browser against the mapped app port,
# and calls the mock's control API on the mapped mock port.
services:
  lnbits-mock:
    build:
      context: ./e2e/mocks/lnbits
    # Container serves on :80; the app reaches it at http://lnbits-mock.
    # Host port 5001 is mapped for Playwright control calls.
    ports:
      - '5001:80'

  piggybank:
    # Pin to amd64 (production's architecture): the app's optional native deps
    # (utf-8-validate/bufferutil via ws) ship amd64 prebuilts, so no source
    # compilation is needed. On arm64 there's no prebuilt and node:slim has no
    # toolchain, so an unpinned build would fail.
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Override the config path so the app loads the test fixture.
      CONFIG_PATH: /config/config.test.json
      # Point the BTC/EUR rate lookup at the mock so tests need no outbound internet.
      KRAKEN_URL: http://lnbits-mock
      NUXT_HOST: '0.0.0.0'
      NUXT_PORT: '3000'
      # Dummy Logto config so the global Logto handler runs without errors. No
      # real tenant is reached: the admin landing page is public, and the
      # protected-route test only exercises the unauthenticated (cookie-only)
      # path, which never calls the Logto endpoint.
      NUXT_LOGTO_ENDPOINT: https://logto.example.com/
      NUXT_LOGTO_APP_ID: e2e-app-id
      NUXT_LOGTO_APP_SECRET: e2e-app-secret
      NUXT_LOGTO_COOKIE_ENCRYPTION_KEY: e2e-cookie-encryption-key
    volumes:
      - ./e2e/fixtures/config.test.json:/config/config.test.json:ro
    ports:
      # Host port 3100 (not 3000) so the E2E app never collides with a local
      # `npm run dev` server. Playwright's baseURL points here.
      - '3100:3000'
    depends_on:
      lnbits-mock:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 30
